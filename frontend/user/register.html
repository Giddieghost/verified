<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Movies - Register</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .register-container { max-width: 450px; margin: 60px auto; background: var(--secondary); padding: 40px; border-radius: 8px; }
    .register-container h1 { color: var(--primary); margin-bottom: 30px; text-align: center; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
    .form-group input { width: 100%; padding: 11px; background-color: #333; border: 1px solid #555; border-radius: 4px; color: #fff; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .btn-register { width: 100%; padding: 12px; margin-top: 25px; font-size: 16px; }
    .login-link { text-align: center; margin-top: 20px; font-size: 14px; }
    .login-link a { color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo"><span style="color: var(--primary);">Get</span> Movies</div>
      <nav>
        <a href="/frontend/user/login.html">Login</a>
        <a href="/frontend/admin/login.html">Admin Portal</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="register-container">
      <h1>Create Your Account</h1>
      <form id="register-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="full_name" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Password (min 8 characters)</label>
          <input type="password" id="password" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary btn-register">Create Account</button>
      </form>
      <div class="login-link">
        <p>Already have an account? <a href="/frontend/user/login.html">Login here</a></p>
      </div>
    </div>
  </main>

  <footer>
    <div class="logo" style="color: var(--primary);"><span>Get</span> Movies</div>
    <p>&copy; 2026 Get Movies. All Rights Reserved.</p>
  </footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
