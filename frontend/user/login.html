<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Movies - Login</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <style>
    .login-container { max-width: 400px; margin: 80px auto; background: var(--secondary); padding: 40px; border-radius: 8px; }
    .login-container h1 { color: var(--primary); margin-bottom: 30px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
    .form-group input { width: 100%; padding: 12px; background-color: #333; border: 1px solid #555; border-radius: 4px; color: #fff; }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .btn-login { width: 100%; padding: 12px; margin-top: 20px; }
    .signup-link { text-align: center; margin-top: 20px; }
    .signup-link a { color: var(--primary); text-decoration: none; }
    .admin-link { text-align: center; margin-top: 15px; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <div class="header-container">
      <div class="logo"><span style="color: var(--primary);">Get</span> Movies</div>
      <nav>
        <a href="/frontend/user/register.html">Create Account</a>
        <a href="/frontend/admin/login.html">Admin Portal</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="login-container">
      <h1>Welcome Back</h1>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-login">Login</button>
      </form>
      <div class="signup-link">
        <p>Don't have an account? <a href="/frontend/user/register.html">Sign up now</a></p>
      </div>
      <div class="admin-link">
        <a href="/frontend/admin/login.html">Admin Login</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="logo" style="color: var(--primary);"><span>Get</span> Movies</div>
    <p>&copy; 2026 Get Movies. All Rights Reserved.</p>
  </footer>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/auth.js"></script>
</body>
</html>
